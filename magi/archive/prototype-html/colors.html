<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 48px;
    color: #111;
  }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 32px; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #555; }
  .palette { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 40px; }
  .swatch {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .swatch:hover { transform: translateY(-4px); }
  .swatch-color {
    width: 120px;
    height: 120px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    margin-bottom: 10px;
  }
  .swatch-name {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .swatch-hex {
    font-size: 13px;
    font-family: "SF Mono", Menlo, monospace;
    color: #777;
  }
  .copied {
    position: fixed;
    top: 24px;
    right: 24px;
    background: #111;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .copied.show { opacity: 1; }
</style>
</head>
<body>

<h1>Color Palette</h1>

<h2>Palette 1</h2>
<div class="palette" id="palette1"></div>

<h2>Palette 2</h2>
<div class="palette" id="palette2"></div>

<h2>Dark Mode</h2>
<div class="palette" id="darkMode"></div>

<h2>Light Mode</h2>
<div class="palette" id="lightMode"></div>

<div class="copied" id="toast">Copied!</div>

<script>
const palette1 = [
  { name: 'Slate Blue',    hex: '#4C6173' },
  { name: 'Antique Gold',  hex: '#A68C5B' },
  { name: 'Warm Sand',     hex: '#D9B97E' },
  { name: 'Tangerine',     hex: '#F27405' },
  { name: 'Vermillion',    hex: '#F24405' },
];

const palette2 = [
  { name: 'Midnight',      hex: '#1C1D26' },
  { name: 'Storm Gray',    hex: '#535D73' },
  { name: 'Antique Gold',  hex: '#A68C5B' },
  { name: 'Dark Umber',    hex: '#262118' },
  { name: 'Aged Bronze',   hex: '#735C40' },
];

const darkMode = [
  { name: 'Soot',         hex: '#131210' },
  { name: 'Charcoal',     hex: '#0E0D0B' },
  { name: 'Ember',        hex: '#1A1916' },
  { name: 'Ash',          hex: '#211F1B' },
  { name: 'Driftwood',    hex: '#8C7E6A' },
  { name: 'Cream',        hex: '#F5EDDA' },
];

const lightMode = [
  { name: 'Cream',        hex: '#F5EDDA' },
  { name: 'Warm Linen',   hex: '#EDE4CF' },
  { name: 'Parchment',    hex: '#EEE5D1' },
  { name: 'Wheat',        hex: '#E3D9C2' },
  { name: 'Warm Border',  hex: '#DDD4C0' },
  { name: 'Driftwood',    hex: '#8C7E6A' },
  { name: 'Espresso',     hex: '#2C2416' },
];

function renderPalette(colors, containerId) {
  const container = document.getElementById(containerId);
  colors.forEach(({ name, hex }) => {
    const swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.innerHTML = `
      <div class="swatch-color" style="background:${hex}"></div>
      <span class="swatch-name">${name}</span>
      <span class="swatch-hex">${hex}</span>
    `;
    swatch.addEventListener('click', () => {
      navigator.clipboard.writeText(hex);
      const toast = document.getElementById('toast');
      toast.textContent = `Copied ${hex}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1200);
    });
    container.appendChild(swatch);
  });
}

renderPalette(palette1, 'palette1');
renderPalette(palette2, 'palette2');
renderPalette(darkMode, 'darkMode');
renderPalette(lightMode, 'lightMode');
</script>
</body>
</html>
