<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dither Egg Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #999;
  }
  h1 { color: #ccc; margin-bottom: 8px; font-weight: 500; font-size: 20px; }
  .subtitle { color: #666; margin-bottom: 32px; font-size: 13px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 120px);
    gap: 32px;
    justify-content: center;
    max-width: 900px;
  }
  .swatch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .swatch span { font-size: 11px; color: #666; }
  .section { margin-top: 48px; margin-bottom: 16px; }
  .section h2 { color: #aaa; font-size: 15px; font-weight: 500; }
  .section p { color: #555; font-size: 12px; margin-top: 4px; }
  .sizes-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
  }
</style>
</head>
<body>

<h1>Dither Egg Prototype</h1>
<p class="subtitle">Real egg shape (y²/a² + x²(1+ky)/b² = 1) — same FBM dither as app</p>

<div class="grid" id="grid"></div>

<div class="section">
  <h2>Size variants</h2>
  <p>16px, 20px, 24px, 32px, 48px</p>
</div>
<div class="sizes-row" id="sizes"></div>

<script>
const COLORS = [
  { name: 'azure',   dark: [  2, 10, 20],  bright: [ 40, 180, 255] },
  { name: 'pink',    dark: [ 30,  4, 16],  bright: [255, 100, 200] },
  { name: 'violet',  dark: [ 16,  8, 35],  bright: [180, 140, 255] },
  { name: 'indigo',  dark: [ 14, 12, 40],  bright: [150, 150, 255] },
  { name: 'green',   dark: [  3, 20,  2],  bright: [100, 240,  80] },
  { name: 'amber',   dark: [ 30, 16,  0],  bright: [255, 190,  20] },
  { name: 'blue',    dark: [  3, 12, 35],  bright: [ 80, 170, 255] },
  { name: 'rose',    dark: [ 30,  3, 10],  bright: [255, 90, 180] },
  { name: 'sky',     dark: [  3, 10, 24],  bright: [ 70, 190, 255] },
  { name: 'gold',    dark: [ 30, 16,  0],  bright: [255, 200,  20] },
  { name: 'cyan',    dark: [  0, 16, 18],  bright: [  0, 230, 240] },
  { name: 'emerald', dark: [  2, 22,  4],  bright: [ 50, 230, 100] },
];

const BAYER8 = [
  [ 0, 32,  8, 40,  2, 34, 10, 42],
  [48, 16, 56, 24, 50, 18, 58, 26],
  [12, 44,  4, 36, 14, 46,  6, 38],
  [60, 28, 52, 20, 62, 30, 54, 22],
  [ 3, 35, 11, 43,  1, 33,  9, 41],
  [51, 19, 59, 27, 49, 17, 57, 25],
  [15, 47,  7, 39, 13, 45,  5, 37],
  [63, 31, 55, 23, 61, 29, 53, 21],
];

// --- Noise (identical to dither-orb.tsx) ---
function hash(x, y, z) {
  let h = (x * 374761393 + y * 668265263 + z * 1274126177) | 0;
  h = ((h ^ (h >> 13)) * 1274126177) | 0;
  return (h & 0x7fffffff) / 0x7fffffff;
}
function smoothstep(t) { return t * t * (3 - 2 * t); }
function noise3d(x, y, z) {
  const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
  const fx = x - ix, fy = y - iy, fz = z - iz;
  const sx = smoothstep(fx), sy = smoothstep(fy), sz = smoothstep(fz);
  return (
    hash(ix,iy,iz)*(1-sx)*(1-sy)*(1-sz) + hash(ix+1,iy,iz)*sx*(1-sy)*(1-sz) +
    hash(ix,iy+1,iz)*(1-sx)*sy*(1-sz) + hash(ix+1,iy+1,iz)*sx*sy*(1-sz) +
    hash(ix,iy,iz+1)*(1-sx)*(1-sy)*sz + hash(ix+1,iy,iz+1)*sx*(1-sy)*sz +
    hash(ix,iy+1,iz+1)*(1-sx)*sy*sz + hash(ix+1,iy+1,iz+1)*sx*sy*sz
  );
}
function fbm(x, y, z) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < 4; i++) {
    val += amp * noise3d(x * freq, y * freq, z * freq);
    amp *= 0.5; freq *= 2;
  }
  return val;
}

// --- Egg shape: y²/a² + x²(1+ky)/b² = 1 ---
// a = half-height, b = half-width, k = asymmetry
// Positive k → pointed top, fat bottom (like a real egg)
// Reference: https://www.johndcook.com/blog/2018/04/18/equation-to-fit-an-egg/
const EGG_A = 1.0;   // half-height (normalized)
const EGG_B = 0.76;  // half-width (~1.3:1 aspect, like a chicken egg)
const EGG_K = 0.2;   // asymmetry (0 = ellipse, higher = more pointy top)

// Implicit function: F(x,y) = y²/a² + x²(1+ky)/b² - 1
// Inside when F ≤ 0
function eggF(ex, ey) {
  return (ey * ey) / (EGG_A * EGG_A) + (ex * ex) * (1 + EGG_K * ey) / (EGG_B * EGG_B) - 1;
}

// Parametric outline for clip path:
// y(t) = a·cos(t), x(t) = b·sin(t) / sqrt(1 + k·a·cos(t))
function eggOutlineX(t) {
  return EGG_B * Math.sin(t) / Math.sqrt(1 + EGG_K * EGG_A * Math.cos(t));
}
function eggOutlineY(t) {
  return EGG_A * Math.cos(t);
}

function createDitherEgg(displaySize, color, container) {
  // Render at fixed high res, display at requested size
  const RENDER_H = 156;
  const RENDER_W = Math.round(RENDER_H * (EGG_B / EGG_A) * 1.01); // slight padding

  const canvas = document.createElement('canvas');
  canvas.width = RENDER_W;
  canvas.height = RENDER_H;
  const displayH = displaySize;
  const displayW = Math.round(displaySize * (RENDER_W / RENDER_H));
  canvas.style.width = displayW + 'px';
  canvas.style.height = displayH + 'px';
  container.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const cxC = RENDER_W / 2;
  const cyC = RENDER_H / 2;
  const scaleY = RENDER_H / 2; // pixels per unit in egg-space (y axis)
  const scaleX = RENDER_W / 2; // pixels per unit in egg-space (x axis)

  const cellSize = 3;
  const dotSize = 3;
  let time = Math.random() * 1000;

  // Fixed light from top-right (positive y = up in egg-space)
  const lnx = 0.5, lny = 0.5, lnz = 0.7071;

  function render() {
    time += 0.025;
    ctx.clearRect(0, 0, RENDER_W, RENDER_H);
    ctx.save();

    // Clip to egg outline
    ctx.beginPath();
    const steps = 256;
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * Math.PI * 2;
      const ox = eggOutlineX(t);
      const oy = eggOutlineY(t);
      // Map egg coords → pixel: egg y=+a is top of canvas
      const px = cxC + ox * (scaleX / (EGG_B * 1.01));
      const py = cyC - oy * (scaleY / EGG_A);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.clip();

    // Dark base
    ctx.fillStyle = `rgb(${color.dark[0]},${color.dark[1]},${color.dark[2]})`;
    ctx.fillRect(0, 0, RENDER_W, RENDER_H);

    // Dither loop
    for (let gy = 0; gy < RENDER_H; gy += cellSize) {
      for (let gx = 0; gx < RENDER_W; gx += cellSize) {
        const dotPx = gx + cellSize / 2;
        const dotPy = gy + cellSize / 2;

        // Pixel → egg coordinates
        // y: top of canvas = +EGG_A, bottom = -EGG_A
        const ey = EGG_A * (1 - 2 * dotPy / RENDER_H);
        const ex = (dotPx - cxC) / scaleX * (EGG_B * 1.01);

        // Inside test
        if (eggF(ex, ey) > 0) continue;

        // 3D egg surface: y²/a² + x²(1+ky)/b² + z² = 1
        const zSq = 1 - (ey * ey) / (EGG_A * EGG_A) - (ex * ex) * (1 + EGG_K * ey) / (EGG_B * EGG_B);
        if (zSq <= 0) continue;
        const ez = Math.sqrt(zSq);

        // Surface normal = gradient of F(x,y,z) = y²/a² + x²(1+ky)/b² + z² - 1
        const gnx = 2 * ex * (1 + EGG_K * ey) / (EGG_B * EGG_B);
        const gny = 2 * ey / (EGG_A * EGG_A) + EGG_K * ex * ex / (EGG_B * EGG_B);
        const gnz = 2 * ez;
        const gnLen = Math.sqrt(gnx * gnx + gny * gny + gnz * gnz);
        const nx = gnx / gnLen;
        const ny = gny / gnLen;
        const nz = gnz / gnLen;

        // Wrapped lambert — light bleeds past the equator
        const NdotL = nx * lnx + ny * lny + nz * lnz;
        const wrap = 0.8;
        const lambert = Math.max(0, (NdotL + wrap) / (1 + wrap));

        // Specular (same as app)
        const hx = lnx, hy = lny, hz = lnz + 1;
        const hLen = Math.sqrt(hx * hx + hy * hy + hz * hz);
        const NdotH = (nx * hx + ny * hy + nz * hz) / hLen;
        const spec = Math.pow(Math.max(0, NdotH), 16) * 0.3;

        // FBM morphing noise (same as app)
        const noiseScale = 1.8;
        const morph = fbm(
          nx * noiseScale + time * 0.35,
          ny * noiseScale + time * 0.3,
          nz * noiseScale + time * 0.25
        );
        const morph2 = fbm(
          nx * 3.5 - time * 0.2,
          ny * 3.5 + time * 0.25,
          nz * 3.5 + time * 0.15
        );
        const noiseOffset = (morph - 0.5) * 0.8 + (morph2 - 0.5) * 0.3;

        const raw = lambert * 1.3 + spec + noiseOffset;
        const value = Math.max(0, Math.min(1, raw));
        const specIntensity = Math.pow(Math.max(0, NdotH), 8);

        // Bayer threshold
        const bx = Math.floor(gx / cellSize) % 8;
        const by = Math.floor(gy / cellSize) % 8;
        const threshold = (BAYER8[by][bx] + 0.5) / 64;

        if (value > threshold) {
          let cr = color.bright[0];
          let cg = color.bright[1];
          let cb = color.bright[2];
          const w = Math.min(0.4, specIntensity * 0.5);
          cr = cr + (255 - cr) * w;
          cg = cg + (255 - cg) * w;
          cb = cb + (255 - cb) * w;
          ctx.fillStyle = `rgb(${Math.round(cr)},${Math.round(cg)},${Math.round(cb)})`;
          ctx.fillRect(gx, gy, dotSize, dotSize);
        }
      }
    }

    ctx.restore();
    requestAnimationFrame(render);
  }

  render();
  return canvas;
}

// Build the grid
const grid = document.getElementById('grid');
COLORS.forEach(color => {
  const swatch = document.createElement('div');
  swatch.className = 'swatch';
  createDitherEgg(100, color, swatch);
  const label = document.createElement('span');
  label.textContent = color.name;
  swatch.appendChild(label);
  grid.appendChild(swatch);
});

// Size variants
const sizesRow = document.getElementById('sizes');
[16, 20, 24, 32, 48].forEach(sz => {
  const swatch = document.createElement('div');
  swatch.className = 'swatch';
  createDitherEgg(sz, COLORS[0], swatch);
  const label = document.createElement('span');
  label.textContent = sz + 'px';
  swatch.appendChild(label);
  sizesRow.appendChild(swatch);
});
</script>
</body>
</html>
